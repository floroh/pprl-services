services:

  mongo:
    image: mongo:8.0
    container_name: us-mongo-db
    restart: always
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - ./us-data:/importdata # Directory with (unzipped) nctestdata[...].json
      - ./us-mongodb:/data/db    # Storage location of MongoDB
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: usvr

